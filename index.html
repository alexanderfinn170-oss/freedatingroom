<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Methi Mix Powder</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#e8fff1,#ffffff,#e6fff8);
}
.hero{
position:relative;
text-align:center;
padding:0;
overflow:hidden;
height:500px;
}
.hero-slider{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}
.hero-slider img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 0.8s ease-in-out;
}
.hero-red-box{
position:relative;
background:red;
color:white;
text-align:center;
padding:25px 20px;
width:100%;
box-sizing:border-box;
}
.hero-red-box h1{
font-size:28px;
margin-bottom:12px;
font-weight:bold;
line-height:1.3;
}
.hero-red-box .price{
font-size:32px;
font-weight:bold;
color:orange;
margin:15px 0;
display:inline-block;
}
.hero-red-box .order-btn{
background:#ff9800;
color:white;
padding:16px 30px;
font-size:20px;
border-radius:50px;
text-decoration:none;
display:inline-block;
font-weight:bold;
animation:pulse 1.5s infinite;
}
.marquee-box{
width:100%;
background:#ffeb3b;
padding:25px 0;
overflow:hidden;
white-space:nowrap;
font-size:24px;
font-weight:bold;
color:#000;
}
.marquee-text{
display:inline-block;
padding-left:100%;
animation:scrollText 30s linear infinite;
}
@keyframes scrollText{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}
.benefit-title{
width:100%;
background:red;
color:white;
text-align:center;
padding:22px 0;
font-size:28px;
font-weight:bold;
}
.benefits{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:40px 20px;
}
.benefit-box{
width:320px;
padding:20px;
border-radius:20px;
color:white;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}
.benefit-box img{
width:100%;
border-radius:15px;
margin-bottom:15px;
}
.benefit-btn{
margin-top:15px;
display:inline-block;
background:white;
color:black;
padding:12px 25px;
border-radius:50px;
font-weight:bold;
text-decoration:none;
animation:pulse 1.5s infinite;
}
.review-section{
padding:40px 20px;
text-align:center;
}
.review-slider{
position:relative;
height:280px;
max-width:500px;
margin:auto;
}
.review{
position:absolute;
width:100%;
opacity:0;
transition:1s;
}
.review.active{opacity:1}
.review img{
width:100%;
border-radius:20px;
}
.form-section{
max-width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}
input,textarea{
width:100%;
padding:15px;
margin:10px 0;
border-radius:15px;
border:1px solid #ccc;
font-size:16px;
}
.submit-btn{
background:#0f9d58;
color:white;
padding:15px;
border:none;
border-radius:50px;
font-size:18px;
width:100%;
}
.success-message{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0f9d58;
color:white;
padding:35px;
border-radius:20px;
font-size:20px;
display:none;
z-index:9999;
}
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="hero">
<div class="hero-slider">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhCdu72MYW1QCRz1j2U9JvtHIoQ0J43HJFZqfy33xSvbsoQ6tZHVDbn0yPZRYOuBKp-ajiz7aDa3T0e53enOpEg0Vh6dxDt2Wws6o-iDH-bYqE__G8J-GY9YSeqjES9sFAh1mB-X3im3o03mFK3NyCpnb4KkD-nt-6-stCiVaW8k6Ymg3L-UR697LDR2Nc/s1599/WhatsApp%20Image%202026-02-22%20at%2011.06.48%20(2).jpeg">
</div>
</div>

<div class="hero-red-box">
<h1>১৫টি প্রিমিয়াম ভেষজে তৈরি ১০০% ন্যাচারাল ফর্মুলা</h1>
<div class="price">মাত্র ৳৪৯৯</div><br>
<a href="#order" class="order-btn">এখানে অর্ডার করুন 👈</a>
</div>

<div id="order" class="form-section">
<h2>৪৯৯৳ অর্ডার করতে ফর্ম পূরণ করুন</h2>

<form id="orderForm">
<input type="text" name="name" placeholder="আপনার নাম লিখুন" required>
<input type="text" name="phone" placeholder="মোবাইল নাম্বার লিখুন" required>
<textarea name="address" placeholder="সম্পূর্ণ ঠিকানা লিখুন" required></textarea>
<button type="submit" class="submit-btn">কনফার্ম অর্ডার</button>
</form>

</div>

<div class="success-message" id="successMessage">
🟩 আপনার অর্ডারটি সফলভাবে সাবমিট হয়েছে 🟩<br><br>
আমাদের প্রতিনিধি শীঘ্রই যোগাযোগ করবে।
</div>

<script>
document.getElementById("orderForm").addEventListener("submit", function(e){
e.preventDefault();

const scriptURL = "https://script.google.com/macros/s/AKfycbxsbya6x847a30Pjd45D4uLA54968HDURD-2dpTZBl-pafx_zXGGU_9Mz5JDypg8Aicfg/exec";

fetch(scriptURL, {
method: "POST",
mode: "no-cors",
body: new FormData(this)
})
.then(() => {
document.getElementById("successMessage").style.display="block";
setTimeout(()=>{
document.getElementById("successMessage").style.display="none";
document.getElementById("orderForm").reset();
},4000);
})
.catch(error => {
alert("কিছু সমস্যা হয়েছে! আবার চেষ্টা করুন।");
});
});
</script>

</body>
</html>
